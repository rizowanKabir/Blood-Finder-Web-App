{% if messages %}
<div class="toast-stack" id="toastStack">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} toast-alert fade show" role="alert" data-autohide="6000">
      <i class="bi
        {% if message.tags == 'success' %}bi-check-circle-fill
        {% elif message.tags == 'danger' %}bi-x-circle-fill
        {% elif message.tags == 'warning' %}bi-exclamation-triangle-fill
        {% else %}bi-info-circle-fill{% endif %} me-2"></i>
      <span>{{ message }}</span>
      <button type="button" class="btn-close btn-close-toast" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% endfor %}
</div>
{% endif %}
