{% extends 'base.html' %}
{% block title %}Confirm Delete — Blood Finder{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container" style="max-width: 520px;">
    <div class="glass-card p-4 p-md-5 text-center fade-in-up">
      <div class="confirm-delete-icon mb-3"><i class="bi bi-exclamation-triangle-fill"></i></div>
      <h3 class="fw-700 mb-2">Are you sure?</h3>
      <p class="text-muted mb-4">This will permanently delete <strong>{{ object }}</strong>. This action cannot be undone.</p>
      <form method="post" class="d-flex gap-2 justify-content-center">
        {% csrf_token %}
        <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-outline-glass px-4">Cancel</a>
        <button type="submit" class="btn btn-danger px-4 rounded-pill">Yes, Delete</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
