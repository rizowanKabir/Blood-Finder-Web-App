{% extends 'base.html' %}
{% block title %}Password Reset Complete — Blood Finder{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="glass-card p-4 p-md-5 text-center fade-in-up">
          <div class="auth-icon"><i class="bi bi-check-circle-fill"></i></div>
          <h3 class="fw-700 mt-3">Password Reset!</h3>
          <p class="text-muted">Your password has been changed successfully.</p>
          <a href="{% url 'accounts:login' %}" class="btn btn-gradient">Login Now</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
